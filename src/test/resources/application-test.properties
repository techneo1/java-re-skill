# =============================================================================
# application-test.properties  (src/test/resources)
#
# Loaded by Spring TestContext when @ActiveProfiles("test") is present on a
# test class, or when spring.profiles.active=test is passed to Surefire.
#
# This file intentionally mirrors src/main/resources/application-test.properties
# so that both mvn test (classpath) and direct IDE test runs pick it up.
# =============================================================================

server.port=0
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never

spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

spring.datasource.url=jdbc:h2:mem:hrdb-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=false

logging.level.com.srikanth.javareskill=INFO
logging.level.org.springframework=WARN
logging.level.org.springframework.test=INFO

app.env=test
app.max-employees=50
app.default-salary=30000.00
app.audit.enabled=false


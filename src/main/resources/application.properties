# =============================================================================
# application.properties ? BASE configuration (shared across all profiles)
#
# Spring Boot profile resolution order (highest ? lowest priority):
#   1. application-{profile}.properties  (active profile overrides)
#   2. application.properties            (this file ? base defaults)
#
# Activate a profile:
#   ? IDE run config : add VM arg  -Dspring.profiles.active=dev
#   ? Maven          : mvn spring-boot:run -Dspring-boot.run.profiles=dev
#   ? Fat-jar        : java -jar app.jar --spring.profiles.active=prod
# =============================================================================

# ?? Active profile default ???????????????????????????????????????????????????
# Falls back to 'dev' when no profile is explicitly supplied.
spring.profiles.active=dev

# ?? Application identity ?????????????????????????????????????????????????????
spring.application.name=java-re-skill

# ?? Jackson (shared across all profiles) ????????????????????????????????????
# Dates serialised as ISO-8601 strings, not numeric timestamps
spring.jackson.serialization.write-dates-as-timestamps=false
# Tolerate unknown fields in incoming JSON (forward-compatible clients)
spring.jackson.deserialization.fail-on-unknown-properties=false
# Pretty-print JSON in all profiles (controllers can override per endpoint)
spring.jackson.serialization.indent-output=true

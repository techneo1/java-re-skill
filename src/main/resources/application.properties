# ?? Server ??????????????????????????????????????????????????????????????
server.port=8080

# ?? Application ?????????????????????????????????????????????????????????
spring.application.name=java-re-skill

# ?? Jackson ?????????????????????????????????????????????????????????????
# Serialize Java dates as ISO-8601 strings instead of timestamps
spring.jackson.serialization.write-dates-as-timestamps=false
# Do not fail on unknown JSON properties in request bodies
spring.jackson.deserialization.fail-on-unknown-properties=false

# ?? Logging ?????????????????????????????????????????????????????????????
logging.level.com.srikanth.javareskill=DEBUG


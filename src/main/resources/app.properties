# ============================================================
# Application configuration  (main/resources/app.properties)
# ============================================================

# Human-readable name shown in logs and startup banners
app.name=HR Management System

# Maximum number of employees the store may hold at one time
app.max.employees=1000

# Default starting salary applied when no explicit salary is supplied
app.default.salary=50000.00

# Set to true to enable audit logging of every store mutation
app.audit.enabled=false


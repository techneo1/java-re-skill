# =============================================================================
# application-test.properties ? TEST profile
#
# Activated automatically by @ActiveProfiles("test") on test classes,
# or via -Dspring.profiles.active=test when running the Surefire plugin.
#
# Goals:
#   ? Deterministic: a fresh in-memory DB per test run (no shared state)
#   ? Fast: minimal logging, no DevTools, no H2 console
#   ? Safe:  no stack-traces exposed; error messages hidden from response body
# =============================================================================

# ?? Server ???????????????????????????????????????????????????????????????????
# Random port prevents port conflicts when tests run in parallel
server.port=0

# Suppress stack-traces in error responses (mirrors production behaviour)
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never

# ?? Spring DevTools ??????????????????????????????????????????????????????????
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# ?? H2 In-Memory Database ????????????????????????????????????????????????????
# Named DB so all connections within one test run share it;
# DB_CLOSE_ON_EXIT=FALSE lets the context close it explicitly.
spring.datasource.url=jdbc:h2:mem:hrdb-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 console disabled in tests ? no need for browser access
spring.h2.console.enabled=false

# ?? Logging ??????????????????????????????????????????????????????????????????
# Keep test output clean: WARN only for Spring internals, INFO for our code
logging.level.com.srikanth.javareskill=INFO
logging.level.org.springframework=WARN
logging.level.org.springframework.test=INFO

# Compact single-line pattern (no colour codes in CI)
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [%-20.20thread] %-40.40logger{39} %msg%n

# ?? Custom app properties ?????????????????????????????????????????????????????
app.env=test
app.max-employees=50
app.default-salary=30000.00
app.audit.enabled=false


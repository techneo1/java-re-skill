# =============================================================================
# application-dev.properties ? DEV profile
#
# Activated automatically when spring.profiles.active=dev (the default).
# Tuned for a developer workstation: verbose logging, DevTools live-reload,
# H2 console enabled for in-browser SQL inspection.
# =============================================================================

# ?? Server ???????????????????????????????????????????????????????????????????
server.port=8080

# Show the full stack-trace in error responses (safe on localhost, NOT in prod)
server.error.include-stacktrace=always
server.error.include-message=always
server.error.include-binding-errors=always

# ?? Spring DevTools ??????????????????????????????????????????????????????????
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# ?? H2 In-Memory Database ????????????????????????????????????????????????????
# Named in-memory DB so multiple connections share the same data
spring.datasource.url=jdbc:h2:mem:hrdb-dev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 web console at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.trace=false
spring.h2.console.settings.web-allow-others=false

# ?? Logging ??????????????????????????????????????????????????????????????????
# DEBUG for our code; INFO for Spring internals (reduces noise)
logging.level.com.srikanth.javareskill=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG
# Log every SQL statement (useful for spotting N+1s or missing indexes)
logging.level.org.springframework.jdbc.core=DEBUG

# Human-readable console pattern for the developer
logging.pattern.console=%clr(%d{HH:mm:ss.SSS}){faint} %clr(%-5level) %clr([%-20.20thread]){faint} %clr(%-40.40logger{39}){cyan} %msg%n

# ?? Custom app properties ?????????????????????????????????????????????????????
app.env=dev
app.max-employees=1000
app.default-salary=50000.00
app.audit.enabled=true

